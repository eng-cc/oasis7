<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>oasis7 Viewer (Web)</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0f17;
        color: #dbe7f5;
        font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }

      body {
        position: relative;
      }

      .viewer-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
        justify-content: center;
        color: #9cb3c9;
        background: rgba(10, 15, 23, 0.94);
        z-index: 20;
        transition: opacity 180ms ease, visibility 180ms ease;
      }

      .viewer-loading.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .viewer-loading__title {
        font-size: 18px;
        font-weight: 600;
        color: #f4f8fc;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
    <script>
      (() => {
        const SOFTWARE_SAFE_MARKERS = [
          "swiftshader",
          "llvmpipe",
          "software rasterizer",
          "basic render driver",
          "softpipe",
          "lavapipe",
        ];
        const STANDARD_RENDER_MODE = "standard";
        const SOFTWARE_SAFE_RENDER_MODE = "software_safe";
        const metaKey = "__AW_VIEWER_RENDER_META__";
        const bootstrapWrappedKey = "__awRenderMetaWrapped";
        const loadingOverlayHiddenKey = "__awLoadingOverlayHidden";
        const loadingOverlaySelector = ".viewer-loading";

        const params = new URLSearchParams(window.location.search);
        const requestedMode = String(params.get("render_mode") || "")
          .trim()
          .toLowerCase();

        const hideLoadingOverlay = () => {
          if (window[loadingOverlayHiddenKey]) {
            return;
          }
          const overlay = document.querySelector(loadingOverlaySelector);
          window[loadingOverlayHiddenKey] = true;
          if (!overlay) {
            return;
          }
          let finalized = false;
          const finalize = () => {
            if (finalized) {
              return;
            }
            finalized = true;
            overlay.remove();
          };
          overlay.classList.add("is-hidden");
          overlay.addEventListener("transitionend", finalize, { once: true });
          window.setTimeout(finalize, 260);
        };

        const waitForStandardCanvasThenHideOverlay = () => {
          let attempts = 0;
          const maxAttempts = 120;
          const pump = () => {
            if (document.querySelector("canvas")) {
              hideLoadingOverlay();
              return;
            }
            attempts += 1;
            if (attempts >= maxAttempts) {
              hideLoadingOverlay();
              return;
            }
            window.requestAnimationFrame(pump);
          };
          window.requestAnimationFrame(pump);
        };

        const detectRenderer = () => {
          const result = {
            rendererClass: "hardware",
            renderer: null,
            vendor: null,
            webglVersion: null,
            softwareSafeReason: null,
          };

          try {
            const canvas = document.createElement("canvas");
            const gl =
              canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
            if (!gl) {
              result.rendererClass = "none";
              result.softwareSafeReason = "webgl_unavailable";
              return result;
            }
            result.webglVersion = gl.getParameter(gl.VERSION) || null;
            const debugInfo = gl.getExtension("WEBGL_debug_renderer_info");
            if (debugInfo) {
              result.renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) || null;
              result.vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) || null;
            }
            const rendererText = String(result.renderer || "").toLowerCase();
            if (SOFTWARE_SAFE_MARKERS.some((marker) => rendererText.includes(marker))) {
              result.rendererClass = "software";
              result.softwareSafeReason = "software_renderer_detected";
            }
          } catch (error) {
            result.rendererClass = "none";
            result.softwareSafeReason = "webgl_probe_failed";
            result.renderer = String(error);
          }
          return result;
        };

        const redirectToSoftwareSafe = (reason) => {
          const url = new URL(window.location.href);
          url.pathname = url.pathname.replace(/[^/]*$/, "software_safe.html");
          url.searchParams.set("render_mode", SOFTWARE_SAFE_RENDER_MODE);
          if (reason) {
            url.searchParams.set("software_safe_reason", reason);
          }
          window.location.replace(url.toString());
        };

        if (!requestedMode) {
          redirectToSoftwareSafe("primary_web_entry");
          return;
        }

        if (requestedMode === "auto") {
          redirectToSoftwareSafe("auto_primary_web_entry");
          return;
        }

        if (requestedMode === SOFTWARE_SAFE_RENDER_MODE) {
          redirectToSoftwareSafe(
            params.get("software_safe_reason") || "explicit_software_safe"
          );
          return;
        }

        if (requestedMode !== STANDARD_RENDER_MODE) {
          redirectToSoftwareSafe("unsupported_render_mode");
          return;
        }

        const renderMeta = {
          renderMode: STANDARD_RENDER_MODE,
          rendererClass: "hardware",
          softwareSafeReason: null,
        };

        const detection = detectRenderer();
        renderMeta.rendererClass = detection.rendererClass;
        renderMeta.renderer = detection.renderer;
        renderMeta.vendor = detection.vendor;
        renderMeta.webglVersion = detection.webglVersion;
        renderMeta.softwareSafeReason = detection.softwareSafeReason;

        renderMeta.renderMode = STANDARD_RENDER_MODE;
        window[metaKey] = Object.freeze({ ...renderMeta });
        window.addEventListener(
          "TrunkApplicationStarted",
          () => {
            waitForStandardCanvasThenHideOverlay();
          },
          { once: true }
        );

        const augmentTestApi = () => {
          const api = window.__AW_TEST__;
          if (!api || typeof api.getState !== "function" || api[bootstrapWrappedKey]) {
            return false;
          }
          const originalGetState = api.getState.bind(api);
          api.getState = () => {
            const base = originalGetState() || {};
            return {
              ...base,
              renderMode: STANDARD_RENDER_MODE,
              rendererClass: window[metaKey]?.rendererClass || "hardware",
              softwareSafeReason: null,
              renderer: window[metaKey]?.renderer ?? null,
              vendor: window[metaKey]?.vendor ?? null,
              webglVersion: window[metaKey]?.webglVersion ?? null,
            };
          };
          api[bootstrapWrappedKey] = true;
          return true;
        };

        if (!augmentTestApi()) {
          let attempts = 0;
          const timer = window.setInterval(() => {
            attempts += 1;
            if (augmentTestApi() || attempts > 400) {
              window.clearInterval(timer);
            }
          }, 50);
        }
      })();
    </script>
    <link data-trunk rel="copy-file" href="favicon.ico" />
    <link
      data-trunk
      rel="copy-file"
      href="assets/fonts/ms-yahei.ttf"
      data-target-path="assets/fonts"
    />
    <link data-trunk rel="copy-file" href="software_safe.html" />
    <link data-trunk rel="copy-file" href="software_safe.js" />
    <link data-trunk rel="rust" data-bin="oasis7_viewer" />
  </head>
  <body>
    <div class="viewer-loading" aria-live="polite">
      <div class="viewer-loading__title">Opening standard visual QA viewer…</div>
      <div>Primary formal Web play uses software_safe; this route is only for explicit standard inspection.</div>
    </div>
  </body>
</html>
