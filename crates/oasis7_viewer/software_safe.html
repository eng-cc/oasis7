<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>oasis7 Viewer (Software-Safe)</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #09111a;
        --panel: rgba(15, 24, 36, 0.94);
        --panel-strong: rgba(21, 33, 48, 0.98);
        --border: rgba(126, 160, 194, 0.2);
        --text: #e7f0fa;
        --muted: #9eb3c7;
        --accent: #63b3ff;
        --accent-soft: rgba(99, 179, 255, 0.16);
        --good: #6ee7b7;
        --warn: #fbbf24;
        --bad: #f87171;
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100%;
        background: radial-gradient(circle at top, #13253a, var(--bg) 58%);
        color: var(--text);
        font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }
      body {
        padding: 16px;
      }
      .shell {
        display: grid;
        grid-template-columns: 320px minmax(320px, 1fr) 360px;
        gap: 16px;
        min-height: calc(100vh - 32px);
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
      }
      .panel__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--panel-strong);
      }
      .panel__title {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }
      .panel__body {
        padding: 16px;
      }
      .stack { display: flex; flex-direction: column; gap: 16px; }
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      .metric {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.02);
      }
      .metric__label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .metric__value {
        font-size: 18px;
        font-weight: 700;
      }
      .badge-row, .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
      }
      .badge--accent { background: var(--accent-soft); color: #c6e4ff; border-color: rgba(99, 179, 255, 0.3); }
      .badge--good { color: var(--good); }
      .badge--warn { color: var(--warn); }
      .badge--bad { color: var(--bad); }
      button {
        appearance: none;
        border: 1px solid rgba(99, 179, 255, 0.3);
        background: linear-gradient(180deg, rgba(99, 179, 255, 0.18), rgba(99, 179, 255, 0.08));
        color: var(--text);
        border-radius: 10px;
        padding: 9px 12px;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover { border-color: rgba(99, 179, 255, 0.55); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      input[type="number"], input[type="search"], textarea {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        padding: 9px 10px;
        resize: vertical;
        min-height: 44px;
        font: inherit;
      }
      .list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 360px;
        overflow: auto;
      }
      .list-item {
        width: 100%;
        text-align: left;
        display: block;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
        padding: 10px 12px;
      }
      .list-item[data-selected="true"] {
        border-color: rgba(99, 179, 255, 0.6);
        background: rgba(99, 179, 255, 0.13);
      }
      .list-item__title {
        font-weight: 700;
        margin-bottom: 4px;
      }
      .list-item__meta {
        color: var(--muted);
        font-size: 12px;
      }
      .event-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 420px;
        overflow: auto;
      }
      .event-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: rgba(255,255,255,0.03);
      }
      .event-card__title {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
        font-weight: 700;
      }
      .event-card__meta {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 8px;
      }
      .json {
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
        color: #d4e4f6;
      }
      .feedback-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: rgba(255,255,255,0.03);
      }
      .feedback-summary {
        font-size: 14px;
        line-height: 1.5;
      }
      .feedback-detail {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }
      .diagnostic {
        border-top: 1px dashed var(--border);
        padding-top: 10px;
      }
      .diagnostic summary {
        cursor: pointer;
        color: var(--muted);
        font-size: 12px;
        user-select: none;
      }
      .empty {
        color: var(--muted);
        border: 1px dashed var(--border);
        border-radius: 12px;
        padding: 14px;
        text-align: center;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .field label { font-size: 12px; color: var(--muted); }
      .control-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      @media (max-width: 1240px) {
        .shell { grid-template-columns: 1fr; }
        .list, .event-list { max-height: none; }
      }
    </style>
  </head>
  <body>
    <div id="app" class="shell" aria-live="polite"></div>
    <script type="module" src="./software_safe.js"></script>
  </body>
</html>
