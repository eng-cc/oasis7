<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>oasis7 Viewer (Software-Safe)</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b100f;
        --bg-deep: #050807;
        --panel: rgba(16, 20, 18, 0.9);
        --panel-strong: rgba(22, 29, 25, 0.98);
        --panel-stage: linear-gradient(180deg, rgba(21, 27, 24, 0.96), rgba(11, 15, 13, 0.98));
        --border: rgba(152, 177, 150, 0.18);
        --border-strong: rgba(198, 169, 107, 0.34);
        --text: #edf1e6;
        --muted: #9ca89a;
        --accent: #8dc7aa;
        --accent-strong: #d0a85b;
        --accent-soft: rgba(141, 199, 170, 0.14);
        --good: #7ed3a6;
        --warn: #dfb66b;
        --bad: #e58f76;
        --font-body: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
        --font-display: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        --font-mono: "SFMono-Regular", "SF Mono", Menlo, Consolas, monospace;
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(208, 168, 91, 0.12), transparent 26%),
          radial-gradient(circle at top right, rgba(141, 199, 170, 0.13), transparent 24%),
          linear-gradient(180deg, #141916 0%, var(--bg) 22%, var(--bg-deep) 100%);
        color: var(--text);
        font-family: var(--font-body);
      }
      body {
        padding: 24px;
        position: relative;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
        background-size: 32px 32px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.45), transparent 88%);
      }
      #app {
        position: relative;
        z-index: 1;
      }
      .shell {
        display: grid;
        grid-template-columns: minmax(240px, 280px) minmax(0, 1.55fr) minmax(300px, 360px);
        grid-template-areas: "targets stage details";
        gap: 18px;
        min-height: calc(100vh - 48px);
        align-items: start;
      }
      .panel {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)),
          var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 22px 50px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(10px);
      }
      .panel--targets { grid-area: targets; }
      .panel--stage {
        grid-area: stage;
        background: var(--panel-stage);
        border-color: var(--border-strong);
        box-shadow: 0 28px 60px rgba(0, 0, 0, 0.34);
      }
      .panel--details { grid-area: details; }
      .panel--nested {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)),
          rgba(255, 255, 255, 0.018);
        border-color: rgba(152, 177, 150, 0.14);
        box-shadow: none;
      }
      .panel--stage .panel__body {
        padding: 20px;
      }
      .panel__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px;
        border-bottom: 1px solid var(--border);
        background: var(--panel-strong);
      }
      .panel__header--stack {
        align-items: flex-start;
        flex-direction: column;
      }
      .panel__eyebrow {
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent-strong);
      }
      .panel__title {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .panel__meta-copy {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }
      .panel__body {
        padding: 16px;
      }
      .panel__body--stage {
        padding: 20px;
      }
      .stack { display: flex; flex-direction: column; gap: 16px; }
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      .metric {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.025);
      }
      .metric__label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .metric__value {
        font-size: 18px;
        font-weight: 700;
      }
      .badge-row, .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid var(--border);
        background: rgba(247, 242, 230, 0.04);
      }
      .badge--accent { background: var(--accent-soft); color: #d5ecdf; border-color: rgba(141, 199, 170, 0.34); }
      .badge--good { color: var(--good); }
      .badge--warn { color: var(--warn); }
      .badge--bad { color: var(--bad); }
      button {
        appearance: none;
        border: 1px solid rgba(208, 168, 91, 0.28);
        background: linear-gradient(180deg, rgba(208, 168, 91, 0.2), rgba(109, 87, 48, 0.08));
        color: var(--text);
        border-radius: 12px;
        padding: 10px 13px;
        font-size: 14px;
        cursor: pointer;
        transition: border-color 140ms ease, transform 140ms ease, background 140ms ease;
      }
      button:hover {
        border-color: rgba(208, 168, 91, 0.54);
        transform: translateY(-1px);
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      input[type="number"], input[type="search"], textarea {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        padding: 9px 10px;
        resize: vertical;
        min-height: 44px;
        font: inherit;
      }
      .list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 360px;
        overflow: auto;
      }
      .list-item {
        width: 100%;
        text-align: left;
        display: block;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
        padding: 10px 12px;
      }
      .list-item[data-selected="true"] {
        border-color: rgba(141, 199, 170, 0.55);
        background: rgba(141, 199, 170, 0.12);
      }
      .list-item__title {
        font-weight: 700;
        margin-bottom: 4px;
      }
      .list-item__meta {
        color: var(--muted);
        font-size: 12px;
      }
      .event-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 420px;
        overflow: auto;
      }
      .event-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: rgba(255,255,255,0.03);
      }
      .event-card--action {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 164px;
        background:
          radial-gradient(circle at top left, rgba(208, 168, 91, 0.08), transparent 34%),
          rgba(255,255,255,0.03);
      }
      .event-card__title {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
        font-weight: 700;
      }
      .event-card__meta {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 8px;
      }
      .json {
        margin: 0;
        font-family: var(--font-mono);
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
        color: #dce7d8;
      }
      .feedback-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: rgba(255,255,255,0.03);
      }
      .feedback-summary {
        font-size: 14px;
        line-height: 1.5;
      }
      .feedback-detail {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }
      .action-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      .callout {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.03);
      }
      .callout--warn {
        border-color: rgba(223, 182, 107, 0.42);
        background: rgba(223, 182, 107, 0.08);
      }
      .callout__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }
      .callout__title {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .callout__body {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .pixel-world-host__summary {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .pixel-world-host__headline {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .stage-hero {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 18px;
        border-radius: 18px;
        border: 1px solid rgba(208, 168, 91, 0.28);
        background:
          radial-gradient(circle at top left, rgba(208, 168, 91, 0.16), transparent 28%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.01)),
          rgba(10, 14, 12, 0.88);
      }
      .stage-hero__topline {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }
      .stage-hero__eyebrow {
        color: var(--accent-strong);
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .stage-hero__title {
        font-family: var(--font-display);
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.02;
        letter-spacing: 0.01em;
        max-width: 14ch;
      }
      .stage-hero__lede {
        max-width: 56ch;
        color: #d4ddcf;
        font-size: 14px;
        line-height: 1.6;
      }
      .hero-focus-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }
      .hero-focus-card {
        min-height: 128px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 14px;
        border-radius: 14px;
        border: 1px solid rgba(152, 177, 150, 0.16);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
          rgba(255, 255, 255, 0.015);
      }
      .hero-focus-card__label {
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .hero-focus-card__value {
        font-family: var(--font-display);
        font-size: 24px;
        line-height: 1.1;
      }
      .hero-focus-card__value--accent { color: #e3efe7; }
      .hero-focus-card__value--good { color: var(--good); }
      .hero-focus-card__value--warn { color: var(--warn); }
      .hero-focus-card__value--body {
        font-family: var(--font-body);
        font-size: 16px;
        line-height: 1.5;
      }
      .hero-focus-card__detail {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }
      .mobile-rail {
        display: none;
      }
      .mobile-rail__link {
        color: var(--text);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid rgba(208, 168, 91, 0.26);
        background: rgba(255, 255, 255, 0.04);
        font-size: 13px;
      }
      .pixel-world-canvas {
        position: relative;
        min-height: 280px;
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid rgba(141, 199, 170, 0.26);
        background:
          linear-gradient(180deg, rgba(9, 15, 12, 0.88), rgba(7, 10, 9, 0.96)),
          radial-gradient(circle at 20% 20%, rgba(141, 199, 170, 0.14), transparent 30%);
      }
      .pixel-world-canvas--rendered {
        min-height: auto;
      }
      .pixel-world-canvas__surface {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      .pixel-world-canvas__grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(141, 199, 170, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(141, 199, 170, 0.08) 1px, transparent 1px);
        background-size: 24px 24px;
        opacity: 0.75;
      }
      .pixel-world-entity {
        position: absolute;
        min-width: 26px;
        min-height: 26px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        font-size: 10px;
        font-weight: 700;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 10px 24px rgba(0,0,0,0.28);
      }
      .pixel-world-entity--location {
        background: linear-gradient(180deg, rgba(110, 231, 183, 0.35), rgba(110, 231, 183, 0.12));
        border-color: rgba(110, 231, 183, 0.5);
      }
      .pixel-world-entity--agent {
        background: linear-gradient(180deg, rgba(141, 199, 170, 0.38), rgba(141, 199, 170, 0.14));
        border-color: rgba(141, 199, 170, 0.54);
      }
      .pixel-world-canvas__overlay {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
      }
      .pixel-world-canvas__callout {
        display: inline-flex;
        align-self: flex-start;
        padding: 8px 10px;
        border-radius: 10px;
        font-size: 12px;
        border: 1px solid var(--border);
        background: rgba(7, 12, 18, 0.82);
      }
      .pixel-world-canvas__callout--goal {
        border-color: rgba(110, 231, 183, 0.38);
        color: var(--good);
      }
      .pixel-world-canvas__callout--blocker {
        border-color: rgba(248, 113, 113, 0.4);
        color: var(--bad);
      }
      .pixel-world-canvas__selection {
        position: absolute;
        right: 12px;
        top: 12px;
        padding: 8px 10px;
        border-radius: 10px;
        font-size: 12px;
        border: 1px solid rgba(99, 179, 255, 0.34);
        background: rgba(7, 12, 18, 0.82);
      }
      .diagnostic {
        border-top: 1px dashed var(--border);
        padding-top: 10px;
      }
      .diagnostic summary {
        cursor: pointer;
        color: var(--muted);
        font-size: 12px;
        user-select: none;
      }
      .entry-menu {
        position: relative;
      }
      .entry-menu[open] {
        z-index: 10;
      }
      .entry-menu__toggle {
        list-style: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(208, 168, 91, 0.32);
        background: linear-gradient(180deg, rgba(208, 168, 91, 0.18), rgba(208, 168, 91, 0.08));
        color: var(--text);
        cursor: pointer;
        user-select: none;
        font-size: 13px;
      }
      .entry-menu__toggle::-webkit-details-marker {
        display: none;
      }
      .entry-menu__panel {
        position: absolute;
        top: calc(100% + 10px);
        right: 0;
        width: min(320px, calc(100vw - 48px));
        padding: 14px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(9, 13, 11, 0.98);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      }
      .diagnostic-surface {
        overflow: hidden;
      }
      .diagnostic-surface summary {
        list-style: none;
        cursor: pointer;
      }
      .diagnostic-surface summary::-webkit-details-marker {
        display: none;
      }
      .diagnostic-surface__summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }
      .diagnostic-surface__title {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .diagnostic-surface__meta {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }
      .empty {
        color: var(--muted);
        border: 1px dashed var(--border);
        border-radius: 12px;
        padding: 14px;
        text-align: center;
        background: rgba(255, 255, 255, 0.015);
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .field label { font-size: 12px; color: var(--muted); }
      .control-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      @media (max-width: 1240px) {
        body { padding: 14px; }
        .shell {
          grid-template-columns: 1fr;
          grid-template-areas:
            "stage"
            "targets"
            "details";
        }
        .list, .event-list { max-height: none; }
        .action-grid { grid-template-columns: 1fr; }
        .diagnostic-surface__summary { align-items: flex-start; flex-direction: column; }
        .stage-hero__topline { flex-direction: column; }
        .stage-hero__title { max-width: none; }
        .hero-focus-grid { grid-template-columns: 1fr; }
        .hero-focus-card { min-height: 0; }
        .mobile-rail {
          position: sticky;
          top: 10px;
          z-index: 5;
          display: flex;
          gap: 8px;
          margin-bottom: 12px;
          padding: 8px;
          border-radius: 999px;
          background: rgba(9, 13, 11, 0.88);
          border: 1px solid rgba(152, 177, 150, 0.18);
          backdrop-filter: blur(10px);
          overflow: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="app" class="shell" aria-live="polite"></div>
    <script type="module" src="./software_safe.js"></script>
  </body>
</html>
