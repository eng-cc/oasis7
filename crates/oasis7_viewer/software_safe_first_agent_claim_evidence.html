<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>software_safe first agent claim evidence</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #0f172a;
      }

      body {
        overflow: hidden;
      }

      iframe {
        border: 0;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <iframe
      id="software-safe-frame"
      src="./software_safe.html?test_api=1&connect=0"
      title="software_safe first agent claim evidence"
    ></iframe>
    <script>
      const snapshot = {
        time: 12,
        player_gameplay: {
          stage_id: "first_session_loop",
          stage_status: "active",
          goal_id: "first_session_loop.create_first_world_feedback",
          goal_kind: "CreateFirstWorldFeedback",
          goal_title: "Claim your first agent slot",
          objective: "Select a target and submit your first slot-1 claim.",
          progress_detail: "The dedicated starter pool can auto-fund the first slot-1 claim when you confirm it.",
          progress_percent: 24,
          blocker_kind: null,
          blocker_detail: null,
          next_step_hint: "Pick an unclaimed target, review the canonical quote, then confirm ClaimAgent.",
          branch_hint: null,
          available_actions: [],
          recent_feedback: null,
          agent_claim: {
            claimer_agent_id: "agent-0",
            current_epoch: 3,
            reputation_tier: 0,
            claim_cap: 1,
            owned_claim_count: 0,
            liquid_main_token_balance: 0,
            restricted_starter_claim_balance: 0,
            slot_1_auto_restricted_starter_claim_amount: 325,
            slot_1_eligible_claim_balance: 325,
            next_claim_quote: {
              slot_index: 1,
              reputation_tier: 0,
              claim_cap: 1,
              owned_claim_count: 0,
              activation_fee_amount: 100,
              claim_bond_amount: 200,
              upkeep_per_epoch: 25,
              total_upfront_amount: 325,
              transferable_liquid_balance: 0,
              restricted_starter_claim_balance: 0,
              auto_restricted_starter_claim_amount: 325,
              eligible_claim_balance: 325,
              release_cooldown_epochs: 3,
              grace_epochs: 2,
              idle_warning_epochs: 7,
              forced_idle_reclaim_epochs: 10,
              forced_reclaim_penalty_bps: 2000,
              blocked_reason: null
            },
            first_agent_claim_approval_request: null,
            owned_claims: []
          }
        }
      };

      const frame = document.getElementById("software-safe-frame");

      function injectSnapshot() {
        const api = frame?.contentWindow?.__AW_TEST__;
        if (!api?.injectSnapshot) {
          window.setTimeout(injectSnapshot, 100);
          return;
        }
        api.injectSnapshot(snapshot);
      }

      frame.addEventListener("load", () => {
        window.setTimeout(injectSnapshot, 150);
      });
    </script>
  </body>
</html>
