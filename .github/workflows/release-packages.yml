name: Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v0.1.0"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  RUST_TOOLCHAIN: 1.92.0
  BUILTIN_WASM_TOOLCHAIN: nightly-2025-12-11
  BUILTIN_WASM_TARGET: wasm32-unknown-unknown

jobs:
  release_gate_runtime_core:
    name: release-gate-runtime-core
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile default
          rustup default "${RUST_TOOLCHAIN}"
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y             jq             netcat-openbsd             pkg-config             libwayland-dev             wayland-protocols             libxkbcommon-dev             libx11-dev             libxi-dev             libxcursor-dev             libxrandr-dev             libxinerama-dev             libasound2-dev             libudev-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-packages-release-gate-runtime-core-v1
          cache-on-failure: true
      - name: Run runtime core release gate
        run: |
          mkdir -p .tmp/release_gate_runtime_core
          ./scripts/ci-tests.sh full-core | tee .tmp/release_gate_runtime_core/ci-tests-full-core.log
      - name: Upload runtime core gate summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-gate-runtime-core-summary
          path: .tmp/release_gate_runtime_core
          if-no-files-found: warn

  release_gate_runtime_support:
    name: release-gate-runtime-support
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile default
          rustup default "${RUST_TOOLCHAIN}"
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y             pkg-config             libwayland-dev             wayland-protocols             libxkbcommon-dev             libx11-dev             libxi-dev             libxcursor-dev             libxrandr-dev             libxinerama-dev             libasound2-dev             libudev-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-packages-release-gate-runtime-support-v1
          cache-on-failure: true
      - name: Run runtime support release gate
        run: |
          mkdir -p .tmp/release_gate_runtime_support
          ./scripts/ci-tests.sh full-support | tee .tmp/release_gate_runtime_support/ci-tests-full-support.log
      - name: Upload runtime support gate summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-gate-runtime-support-summary
          path: .tmp/release_gate_runtime_support
          if-no-files-found: warn

  release_gate_runtime_sync:
    name: release-gate-runtime-sync
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile default
          rustup default "${RUST_TOOLCHAIN}"
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y             jq             pkg-config             libwayland-dev             wayland-protocols             libxkbcommon-dev             libx11-dev             libxi-dev             libxcursor-dev             libxrandr-dev             libxinerama-dev             libasound2-dev             libudev-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-packages-release-gate-runtime-sync-v1
          cache-on-failure: true
      - name: Install canonical builtin wasm toolchain
        run: |
          rustup toolchain install "${BUILTIN_WASM_TOOLCHAIN}" --profile minimal --component rust-src
          rustup target add "${BUILTIN_WASM_TARGET}" --toolchain "${BUILTIN_WASM_TOOLCHAIN}"
      - name: Run runtime sync release gate
        run: |
          mkdir -p .tmp/release_gate_runtime_sync
          {
            echo "+ ./scripts/sync-m1-builtin-wasm-artifacts.sh --check"
            ./scripts/sync-m1-builtin-wasm-artifacts.sh --check
            echo "+ ./scripts/sync-m4-builtin-wasm-artifacts.sh --check"
            ./scripts/sync-m4-builtin-wasm-artifacts.sh --check
            echo "+ ./scripts/sync-m5-builtin-wasm-artifacts.sh --check"
            ./scripts/sync-m5-builtin-wasm-artifacts.sh --check
          } | tee .tmp/release_gate_runtime_sync/runtime-sync-checks.log
      - name: Upload runtime sync gate summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-gate-runtime-sync-summary
          path: .tmp/release_gate_runtime_sync
          if-no-files-found: warn

  release_gate_web:
    name: release-gate-web
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install viewer web dependencies
        run: npm ci --prefix crates/oasis7_viewer
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile default
          rustup target add wasm32-unknown-unknown --toolchain "${RUST_TOOLCHAIN}"
          rustup default "${RUST_TOOLCHAIN}"
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            netcat-openbsd \
            pkg-config \
            xvfb \
            xauth \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libasound2-dev \
            libudev-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-packages-web-wasm-v2
          cache-on-failure: true
      - name: Run web strict release gate
        run: |
          xvfb-run -a ./scripts/release-gate.sh \
            --out-dir .tmp/release_gate_web \
            --skip-ci-full \
            --skip-sync \
            --skip-s9 \
            --skip-s10 \
            --web-headed
      - name: Upload web gate summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-gate-web-summary
          path: .tmp/release_gate_web
          if-no-files-found: warn

  release_gate_soak:
    name: release-gate-soak
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile default
          rustup default "${RUST_TOOLCHAIN}"
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            jq \
            pkg-config \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libasound2-dev \
            libudev-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-packages-release-gate-soak-v1
          cache-on-failure: true
      - name: Prewarm soak runtime binary
        run: env -u RUSTC_WRAPPER cargo build -p oasis7 --bin oasis7_chain_runtime
      - name: Run soak release gate
        run: |
          ./scripts/release-gate.sh \
            --out-dir .tmp/release_gate_soak \
            --skip-ci-full \
            --skip-sync \
            --skip-web-strict
      - name: Upload soak gate summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-gate-soak-summary
          path: .tmp/release_gate_soak
          if-no-files-found: warn

  release_gate:
    name: release-gate
    if: always()
    needs:
      - release_gate_runtime_core
      - release_gate_runtime_support
      - release_gate_runtime_sync
      - release_gate_web
      - release_gate_soak
    runs-on: ubuntu-24.04
    steps:
      - name: Assert all release gates passed
        env:
          RUNTIME_CORE_RESULT: ${{ needs.release_gate_runtime_core.result }}
          RUNTIME_SUPPORT_RESULT: ${{ needs.release_gate_runtime_support.result }}
          RUNTIME_SYNC_RESULT: ${{ needs.release_gate_runtime_sync.result }}
          WEB_RESULT: ${{ needs.release_gate_web.result }}
          SOAK_RESULT: ${{ needs.release_gate_soak.result }}
        run: |
          failed=0
          for gate in runtime_core runtime_support runtime_sync web soak; do
            upper_name=$(printf '%s' "$gate" | tr '[:lower:]' '[:upper:]')
            result_var="${upper_name}_RESULT"
            result=${!result_var}
            echo "${gate}: ${result}"
            if [[ "$result" != "success" ]]; then
              failed=1
            fi
          done
          if [[ "$failed" -ne 0 ]]; then
            echo "error: one or more release sub-gates failed" >&2
            exit 1
          fi

  build-web-dist:
    needs: release_gate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install viewer web dependencies
        run: npm ci --prefix crates/oasis7_viewer
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile default
          rustup target add wasm32-unknown-unknown --toolchain "${RUST_TOOLCHAIN}"
          rustup default "${RUST_TOOLCHAIN}"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-packages-web-wasm-v2
          cache-on-failure: true
      - name: Build web dists
        run: |
          mkdir -p output/release/web-dist output/release/web-launcher-dist
          (
            npm --prefix crates/oasis7_viewer run build:software-safe
            cp crates/oasis7_viewer/software_safe.html output/release/web-dist/index.html
            cp crates/oasis7_viewer/software_safe.html output/release/web-dist/viewer.html
            cp crates/oasis7_viewer/software_safe.html output/release/web-dist/software_safe.html
            cp crates/oasis7_viewer/software_safe.js output/release/web-dist/viewer.js
            cp crates/oasis7_viewer/software_safe.js output/release/web-dist/software_safe.js
            cp crates/oasis7_viewer/software_safe_first_agent_claim_evidence.html output/release/web-dist/software_safe_first_agent_claim_evidence.html
            cp crates/oasis7_viewer/favicon.ico output/release/web-dist/favicon.ico
          )
          (
            cd crates/oasis7_client_launcher
            env -u NO_COLOR trunk build --release --dist ../../output/release/web-launcher-dist
          )
      - name: Upload web dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-web-dists
          path: |
            output/release/web-dist
            output/release/web-launcher-dist
          if-no-files-found: error

  package-native:
    needs: build-web-dist
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
            asset_name: oasis7-linux-x86_64.AppImage
            target_triple: native
          - os: macos-14
            platform: macos-x64
            asset_name: oasis7-macos-x64.dmg
            target_triple: x86_64-apple-darwin
          - os: windows-2022
            platform: windows-x64
            asset_name: oasis7-windows-x64.exe
            target_triple: native
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile default
          rustup default "${RUST_TOOLCHAIN}"
          if [[ "${{ matrix.target_triple }}" != "native" ]]; then
            rustup target add "${{ matrix.target_triple }}" --toolchain "${RUST_TOOLCHAIN}"
          fi
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libasound2-dev \
            libudev-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-packages-package-native-${{ runner.os }}-${{ matrix.target_triple }}-v2
          cache-on-failure: true
      - name: Ensure Linux AppImage tooling
        if: matrix.platform == 'linux-x64'
        shell: bash
        run: |
          set -euo pipefail
          APPIMAGETOOL_VERSION="1.9.1"
          APPIMAGETOOL_FILENAME="appimagetool-x86_64.AppImage"
          APPIMAGETOOL_URL="https://github.com/AppImage/appimagetool/releases/download/${APPIMAGETOOL_VERSION}/${APPIMAGETOOL_FILENAME}"
          APPIMAGETOOL_SHA256="ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0"

          mkdir -p "${RUNNER_TEMP}/appimagetool"
          curl -fsSL "${APPIMAGETOOL_URL}" \
            -o "${RUNNER_TEMP}/appimagetool/${APPIMAGETOOL_FILENAME}"
          printf '%s  %s\n' \
            "${APPIMAGETOOL_SHA256}" \
            "${RUNNER_TEMP}/appimagetool/${APPIMAGETOOL_FILENAME}" | sha256sum -c -
          chmod +x "${RUNNER_TEMP}/appimagetool/${APPIMAGETOOL_FILENAME}"
          ln -sf \
            "${RUNNER_TEMP}/appimagetool/${APPIMAGETOOL_FILENAME}" \
            "${RUNNER_TEMP}/appimagetool/appimagetool"
          echo "${RUNNER_TEMP}/appimagetool" >> "${GITHUB_PATH}"
      - name: Download web dist artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-web-dists
          path: output/release
      - name: Ensure Windows packaging dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $missing = @()
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            $missing += "nsis"
          }
          if ($missing.Count -eq 0) {
            exit 0
          }
          choco install $missing -y --no-progress
      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          tag="${tag#v}"
          if [[ -z "${tag}" ]]; then
            echo "error: release version is empty" >&2
            exit 1
          fi
          echo "value=${tag}" >> "${GITHUB_OUTPUT}"
      - name: Build launcher bundle
        shell: bash
        run: |
          ./scripts/release-prepare-bundle.sh \
            --platform "${{ matrix.platform }}" \
            --target-triple "${{ matrix.target_triple }}" \
            --web-dist output/release/web-dist \
            --web-launcher-dist output/release/web-launcher-dist \
            --out-dir output/release/assets \
            --profile release
      - name: Package native installer
        shell: bash
        run: |
          chmod +x ./scripts/package-native-installer.sh
          ./scripts/package-native-installer.sh \
            --platform "${{ matrix.platform }}" \
            --bundle-dir "output/release/assets/oasis7-${{ matrix.platform }}" \
            --out-dir output/release/assets \
            --asset-name "${{ matrix.asset_name }}" \
            --version "${{ steps.release_version.outputs.value }}"
      - name: Package secondary Linux .deb
        if: matrix.platform == 'linux-x64'
        shell: bash
        run: |
          ./scripts/package-native-installer.sh \
            --platform "${{ matrix.platform }}" \
            --bundle-dir "output/release/assets/oasis7-${{ matrix.platform }}" \
            --out-dir output/release/assets \
            --asset-name "oasis7-linux-x64.deb" \
            --version "${{ steps.release_version.outputs.value }}"
      - name: Upload platform asset
        uses: actions/upload-artifact@v7
        with:
          name: release-asset-${{ matrix.platform }}
          path: output/release/assets/${{ matrix.asset_name }}
          if-no-files-found: error
      - name: Upload secondary Linux .deb
        if: matrix.platform == 'linux-x64'
        uses: actions/upload-artifact@v7
        with:
          name: release-asset-linux-x64-deb-secondary
          path: output/release/assets/oasis7-linux-x64.deb
          if-no-files-found: error

  publish-release:
    needs: package-native
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ -z "${tag}" ]]; then
            echo "error: release tag is empty" >&2
            exit 1
          fi
          if [[ "${tag}" != v* ]]; then
            echo "error: release tag must start with 'v': ${tag}" >&2
            exit 1
          fi
          echo "value=${tag}" >> "${GITHUB_OUTPUT}"
      - name: Download packaged assets
        uses: actions/download-artifact@v5
        with:
          pattern: release-asset-*
          path: output/release/assets
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd output/release/assets
          ls -l
          for file in \
            oasis7-linux-x86_64.AppImage \
            oasis7-linux-x64.deb \
            oasis7-macos-x64.dmg \
            oasis7-windows-x64.exe
          do
            [[ -f "${file}" ]] || { echo "error: missing release asset ${file}" >&2; exit 1; }
          done
          sha256sum \
            oasis7-linux-x86_64.AppImage \
            oasis7-linux-x64.deb \
            oasis7-macos-x64.dmg \
            oasis7-windows-x64.exe \
            > oasis7-checksums.txt
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: oasis7 ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: |
            output/release/assets/oasis7-linux-x86_64.AppImage
            output/release/assets/oasis7-linux-x64.deb
            output/release/assets/oasis7-macos-x64.dmg
            output/release/assets/oasis7-windows-x64.exe
            output/release/assets/oasis7-checksums.txt
