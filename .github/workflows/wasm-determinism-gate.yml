name: Wasm Determinism Gate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      external_summary_bundle_url:
        description: Optional URL to a Docker-capable external summary bundle archive/directory snapshot for darwin-arm64 evidence verify. This does not make GitHub-hosted CI itself a darwin-arm64 evidence producer.
        required: false
        type: string
      external_summary_runner_label:
        description: Runner label expected from the external summary bundle. Workflow dispatch only verifies/imports this evidence; cross-host closure still requires the external runner to have produced real darwin-arm64 live evidence.
        required: false
        default: darwin-arm64
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_TOOLCHAIN: 1.92.0
  OASIS7_WASM_TOOLCHAIN: nightly-2025-12-11
  OASIS7_WASM_TARGET: wasm32-unknown-unknown
  OASIS7_WASM_BUILD_STD: "1"
  OASIS7_WASM_BUILD_STD_COMPONENTS: std,panic_abort

jobs:
  plan-wasm-determinism-scope:
    runs-on: ubuntu-24.04
    outputs:
      scope: ${{ steps.scope.outputs.scope }}
      run_all: ${{ steps.scope.outputs.run_all }}
      run_m1: ${{ steps.scope.outputs.run_m1 }}
      run_m4: ${{ steps.scope.outputs.run_m4 }}
      run_m5: ${{ steps.scope.outputs.run_m5 }}
      selected_module_sets: ${{ steps.scope.outputs.selected_module_sets }}
      reason_summary: ${{ steps.scope.outputs.reason_summary }}
      changed_path_count: ${{ steps.scope.outputs.changed_path_count }}
      changed_paths: ${{ steps.scope.outputs.changed_paths }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: scope
        name: Plan builtin wasm scope
        run: |
          base_ref=""
          head_ref="${GITHUB_SHA}"
          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              base_ref="${{ github.event.pull_request.base.sha }}"
              head_ref="${{ github.event.pull_request.head.sha }}"
              ;;
            push)
              base_ref="${{ github.event.before }}"
              ;;
          esac

          ./scripts/plan-wasm-determinism-scope.sh \
            --event-name "${GITHUB_EVENT_NAME}" \
            --base-ref "${base_ref}" \
            --head-ref "${head_ref}" \
            --github-output "${GITHUB_OUTPUT}"
      - name: Report planned scope
        run: |
          echo "scope=${{ steps.scope.outputs.scope }}"
          echo "selected_module_sets=${{ steps.scope.outputs.selected_module_sets }}"
          echo "reason_summary=${{ steps.scope.outputs.reason_summary }}"
          echo "changed_path_count=${{ steps.scope.outputs.changed_path_count }}"

  collect-wasm-summaries:
    needs: plan-wasm-determinism-scope
    strategy:
      fail-fast: false
      matrix:
        include:
          - module_set: m1
            runner_os: ubuntu-24.04
            runner_label: linux-x86_64
          - module_set: m4
            runner_os: ubuntu-24.04
            runner_label: linux-x86_64
          - module_set: m5
            runner_os: ubuntu-24.04
            runner_label: linux-x86_64
    runs-on: ${{ matrix.runner_os }}
    steps:
      - uses: actions/checkout@v6
      - name: Scope note for unrelated changes
        if: ${{ (matrix.module_set == 'm1' && needs.plan-wasm-determinism-scope.outputs.run_m1 != 'true') || (matrix.module_set == 'm4' && needs.plan-wasm-determinism-scope.outputs.run_m4 != 'true') || (matrix.module_set == 'm5' && needs.plan-wasm-determinism-scope.outputs.run_m5 != 'true') }}
        run: |
          echo "Skipping ${{ matrix.module_set }} summary collection; scope=${{ needs.plan-wasm-determinism-scope.outputs.scope }} selected=${{ needs.plan-wasm-determinism-scope.outputs.selected_module_sets }} reason=${{ needs.plan-wasm-determinism-scope.outputs.reason_summary }}"
      - name: Install pinned Rust toolchains
        if: ${{ (matrix.module_set == 'm1' && needs.plan-wasm-determinism-scope.outputs.run_m1 == 'true') || (matrix.module_set == 'm4' && needs.plan-wasm-determinism-scope.outputs.run_m4 == 'true') || (matrix.module_set == 'm5' && needs.plan-wasm-determinism-scope.outputs.run_m5 == 'true') }}
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile default
          rustup target add wasm32-unknown-unknown --toolchain "${RUST_TOOLCHAIN}"
          rustup default "${RUST_TOOLCHAIN}"
          rustup toolchain install "${OASIS7_WASM_TOOLCHAIN}" --profile minimal --component rust-src
          rustup target add "${OASIS7_WASM_TARGET}" --toolchain "${OASIS7_WASM_TOOLCHAIN}"
      - name: Collect ${{ matrix.module_set }} summary on ${{ matrix.runner_label }}
        if: ${{ (matrix.module_set == 'm1' && needs.plan-wasm-determinism-scope.outputs.run_m1 == 'true') || (matrix.module_set == 'm4' && needs.plan-wasm-determinism-scope.outputs.run_m4 == 'true') || (matrix.module_set == 'm5' && needs.plan-wasm-determinism-scope.outputs.run_m5 == 'true') }}
        run: |
          ./scripts/ci-m1-wasm-summary.sh \
            --module-set "${{ matrix.module_set }}" \
            --runner-label "${{ matrix.runner_label }}" \
            --out "output/ci/${{ matrix.module_set }}-wasm-summary/${{ matrix.runner_label }}.json"
      - name: Upload ${{ matrix.module_set }} summary artifact
        if: ${{ (matrix.module_set == 'm1' && needs.plan-wasm-determinism-scope.outputs.run_m1 == 'true') || (matrix.module_set == 'm4' && needs.plan-wasm-determinism-scope.outputs.run_m4 == 'true') || (matrix.module_set == 'm5' && needs.plan-wasm-determinism-scope.outputs.run_m5 == 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module_set }}-wasm-summary-${{ matrix.runner_label }}
          path: output/ci/${{ matrix.module_set }}-wasm-summary/${{ matrix.runner_label }}.json
          if-no-files-found: error

  verify-wasm-determinism:
    needs:
      - plan-wasm-determinism-scope
      - collect-wasm-summaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - module_set: m1
          - module_set: m4
          - module_set: m5
    runs-on: ubuntu-24.04
    steps:
      - name: Scope note for unrelated changes
        if: ${{ (matrix.module_set == 'm1' && needs.plan-wasm-determinism-scope.outputs.run_m1 != 'true') || (matrix.module_set == 'm4' && needs.plan-wasm-determinism-scope.outputs.run_m4 != 'true') || (matrix.module_set == 'm5' && needs.plan-wasm-determinism-scope.outputs.run_m5 != 'true') }}
        run: |
          echo "Skipping ${{ matrix.module_set }} verify; scope=${{ needs.plan-wasm-determinism-scope.outputs.scope }} selected=${{ needs.plan-wasm-determinism-scope.outputs.selected_module_sets }} reason=${{ needs.plan-wasm-determinism-scope.outputs.reason_summary }}"
      - uses: actions/checkout@v6
        if: ${{ (matrix.module_set == 'm1' && needs.plan-wasm-determinism-scope.outputs.run_m1 == 'true') || (matrix.module_set == 'm4' && needs.plan-wasm-determinism-scope.outputs.run_m4 == 'true') || (matrix.module_set == 'm5' && needs.plan-wasm-determinism-scope.outputs.run_m5 == 'true') }}
      - name: Download ${{ matrix.module_set }} summary artifacts
        if: ${{ (matrix.module_set == 'm1' && needs.plan-wasm-determinism-scope.outputs.run_m1 == 'true') || (matrix.module_set == 'm4' && needs.plan-wasm-determinism-scope.outputs.run_m4 == 'true') || (matrix.module_set == 'm5' && needs.plan-wasm-determinism-scope.outputs.run_m5 == 'true') }}
        uses: actions/download-artifact@v5
        with:
          pattern: ${{ matrix.module_set }}-wasm-summary-*
          path: output/ci/${{ matrix.module_set }}-wasm-summary
          merge-multiple: true
      - name: Stage ${{ matrix.module_set }} summaries for evidence verify
        if: ${{ (matrix.module_set == 'm1' && needs.plan-wasm-determinism-scope.outputs.run_m1 == 'true') || (matrix.module_set == 'm4' && needs.plan-wasm-determinism-scope.outputs.run_m4 == 'true') || (matrix.module_set == 'm5' && needs.plan-wasm-determinism-scope.outputs.run_m5 == 'true') }}
        env:
          EXTERNAL_WASM_SUMMARY_BUNDLE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.external_summary_bundle_url || '' }}
          EXTERNAL_WASM_SUMMARY_RUNNER_LABEL: ${{ github.event_name == 'workflow_dispatch' && inputs.external_summary_runner_label || 'darwin-arm64' }}
        run: |
          cmd=(
            ./scripts/stage-wasm-summary-imports.sh
            --module-set "${{ matrix.module_set }}"
            --local-summary-dir "output/ci/${{ matrix.module_set }}-wasm-summary"
            --out-dir "output/ci/${{ matrix.module_set }}-staged-wasm-summary"
          )
          if [[ -n "$EXTERNAL_WASM_SUMMARY_BUNDLE_URL" ]]; then
            # This path only verifies/imports external darwin-arm64 evidence.
            # GitHub-hosted CI remains Linux-hosted and cannot by itself claim WDBP-3.2 closure.
            cmd+=(
              --external-summary-bundle "$EXTERNAL_WASM_SUMMARY_BUNDLE_URL"
              --expected-external-runner "$EXTERNAL_WASM_SUMMARY_RUNNER_LABEL"
            )
          fi
          "${cmd[@]}"
      - name: Verify ${{ matrix.module_set }} multi-runner summaries and write evidence report
        if: ${{ (matrix.module_set == 'm1' && needs.plan-wasm-determinism-scope.outputs.run_m1 == 'true') || (matrix.module_set == 'm4' && needs.plan-wasm-determinism-scope.outputs.run_m4 == 'true') || (matrix.module_set == 'm5' && needs.plan-wasm-determinism-scope.outputs.run_m5 == 'true') }}
        run: |
          ./scripts/wasm-release-evidence-report.sh \
            --module-sets "${{ matrix.module_set }}" \
            --skip-collect \
            --summary-import-dir "output/ci/${{ matrix.module_set }}-staged-wasm-summary" \
            --out-dir "output/ci/${{ matrix.module_set }}-wasm-release-evidence" \
            --required-runners linux-x86_64 \
            --expected-runners linux-x86_64,darwin-arm64
      - name: Upload ${{ matrix.module_set }} release evidence report
        if: ${{ (matrix.module_set == 'm1' && needs.plan-wasm-determinism-scope.outputs.run_m1 == 'true') || (matrix.module_set == 'm4' && needs.plan-wasm-determinism-scope.outputs.run_m4 == 'true') || (matrix.module_set == 'm5' && needs.plan-wasm-determinism-scope.outputs.run_m5 == 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module_set }}-wasm-release-evidence-report
          path: output/ci/${{ matrix.module_set }}-wasm-release-evidence
          if-no-files-found: error
