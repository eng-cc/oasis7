<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xiaohongshu Spring Recruit Cover</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500;700&family=Manrope:wght@500;700;800&family=Noto+Serif+SC:wght@600;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --sky: #f6f5ef;
        --mint: #e6f0df;
        --mint-deep: #c8d9be;
        --blossom: #f3d8d7;
        --peach: #f4cbb2;
        --paper: rgba(255, 251, 246, 0.88);
        --paper-solid: #fffaf4;
        --ink: #241b16;
        --muted: rgba(36, 27, 22, 0.7);
        --soft: rgba(36, 27, 22, 0.45);
        --sage: #5c7558;
        --coral: #d66a4f;
        --gold: #c89a46;
        --line: rgba(36, 27, 22, 0.1);
        --shadow: 0 28px 64px rgba(73, 51, 39, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 14% 14%, rgba(214, 106, 79, 0.16), transparent 20%),
          radial-gradient(circle at 82% 18%, rgba(92, 117, 88, 0.18), transparent 22%),
          linear-gradient(145deg, #eef3e9 0%, #f8f3ec 42%, #f7ebe3 100%);
        color: var(--ink);
        font-family: "Manrope", sans-serif;
      }

      .cover {
        position: relative;
        width: 1080px;
        height: 1440px;
        overflow: hidden;
        background:
          radial-gradient(circle at 12% 16%, rgba(243, 216, 215, 0.9), transparent 24%),
          radial-gradient(circle at 88% 14%, rgba(230, 240, 223, 0.92), transparent 22%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.36), transparent 22%),
          linear-gradient(140deg, #f8f4ee, #f6f2e9 44%, #eff4e8);
      }

      .grain,
      .grid,
      .petals,
      .sun-wash {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .grain {
        opacity: 0.12;
        background-image:
          radial-gradient(circle at 20% 20%, rgba(0, 0, 0, 0.75) 0.7px, transparent 0.8px),
          radial-gradient(circle at 75% 28%, rgba(0, 0, 0, 0.55) 0.7px, transparent 0.8px),
          radial-gradient(circle at 36% 80%, rgba(0, 0, 0, 0.45) 0.7px, transparent 0.8px);
        background-size: 22px 22px, 28px 28px, 34px 34px;
      }

      .grid {
        background-image:
          linear-gradient(to right, var(--line) 1px, transparent 1px),
          linear-gradient(to bottom, var(--line) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.45), transparent 90%);
      }

      .sun-wash::before {
        content: "";
        position: absolute;
        width: 520px;
        height: 520px;
        right: -120px;
        top: -90px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(244, 203, 178, 0.42), rgba(244, 203, 178, 0.06) 55%, transparent 72%);
      }

      .petals::before,
      .petals::after {
        content: "";
        position: absolute;
        border-radius: 80% 20% 70% 30%;
        background: rgba(243, 216, 215, 0.66);
        transform: rotate(-18deg);
        box-shadow:
          120px 38px 0 -18px rgba(243, 216, 215, 0.58),
          240px -28px 0 -10px rgba(244, 203, 178, 0.48),
          440px 104px 0 -28px rgba(243, 216, 215, 0.42),
          604px 18px 0 -8px rgba(230, 240, 223, 0.52),
          748px 162px 0 -24px rgba(243, 216, 215, 0.42);
      }

      .petals::before {
        width: 68px;
        height: 34px;
        left: 52px;
        top: 134px;
      }

      .petals::after {
        width: 74px;
        height: 38px;
        right: 140px;
        bottom: 360px;
      }

      .masthead {
        position: absolute;
        top: 72px;
        left: 76px;
        right: 76px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: "IBM Plex Mono", monospace;
        font-size: 18px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .brand,
      .season {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--soft);
        font-weight: 700;
      }

      .brand::before,
      .season::before {
        content: "";
        width: 10px;
        height: 10px;
        background: var(--coral);
        box-shadow: 0 0 0 8px rgba(214, 106, 79, 0.12);
      }

      .season-ticket {
        position: absolute;
        right: 82px;
        top: 122px;
        padding: 14px 20px;
        border: 1px solid rgba(92, 117, 88, 0.14);
        border-radius: 999px;
        background: rgba(255, 251, 246, 0.7);
        color: var(--sage);
        font-family: "IBM Plex Mono", monospace;
        font-size: 17px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-weight: 700;
      }

      .hero {
        position: absolute;
        left: 78px;
        right: 78px;
        top: 196px;
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 28px;
      }

      .hero-copy .eyebrow {
        display: inline-block;
        margin-bottom: 24px;
        color: var(--sage);
        font-family: "IBM Plex Mono", monospace;
        font-size: 20px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-weight: 700;
      }

      .hero h1 {
        margin: 0;
        max-width: 620px;
        font-family: "Noto Serif SC", serif;
        font-size: 102px;
        line-height: 1.02;
        letter-spacing: -0.06em;
      }

      .hero h1 .accent {
        color: var(--coral);
      }

      .hero p {
        margin: 28px 0 0;
        max-width: 540px;
        font-size: 30px;
        line-height: 1.56;
        color: var(--muted);
      }

      .resume-stack {
        position: relative;
        min-height: 430px;
      }

      .sheet {
        position: absolute;
        width: 100%;
        border-radius: 28px;
        background: var(--paper);
        border: 1px solid rgba(36, 27, 22, 0.08);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .sheet::before {
        content: "";
        position: absolute;
        top: 18px;
        left: 22px;
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: rgba(36, 27, 22, 0.14);
        box-shadow:
          24px 0 0 rgba(36, 27, 22, 0.08),
          48px 0 0 rgba(36, 27, 22, 0.08);
      }

      .sheet.back {
        inset: 54px 34px 0 auto;
        height: 270px;
        background: linear-gradient(180deg, rgba(230, 240, 223, 0.92), rgba(255, 251, 246, 0.82));
        transform: rotate(7deg);
      }

      .sheet.front {
        inset: 16px 0 auto auto;
        height: 330px;
        padding: 52px 28px 26px;
        transform: rotate(-3deg);
      }

      .sheet .title {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--soft);
        font-family: "IBM Plex Mono", monospace;
        font-size: 14px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-weight: 700;
      }

      .sheet .title::before {
        content: "";
        width: 8px;
        height: 8px;
        background: var(--gold);
        border-radius: 999px;
      }

      .sheet h2 {
        margin: 18px 0 14px;
        font-family: "Noto Serif SC", serif;
        font-size: 48px;
        line-height: 1.14;
        letter-spacing: -0.04em;
      }

      .sheet p {
        color: var(--muted);
        font-size: 22px;
        line-height: 1.5;
      }

      .pin {
        position: absolute;
        top: -14px;
        right: 42px;
        width: 108px;
        height: 28px;
        border-radius: 999px;
        background: rgba(200, 154, 70, 0.26);
        transform: rotate(-8deg);
      }

      .qualities {
        position: absolute;
        left: 72px;
        right: 72px;
        bottom: 102px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 18px;
      }

      .quality {
        position: relative;
        min-height: 228px;
        padding: 34px 22px 24px;
        border-radius: 24px;
        border: 1px solid rgba(36, 27, 22, 0.08);
        box-shadow: var(--shadow);
      }

      .quality:nth-child(1) {
        background: linear-gradient(180deg, rgba(230, 240, 223, 0.96), rgba(255, 251, 246, 0.86));
        transform: rotate(-2deg);
      }

      .quality:nth-child(2) {
        background: linear-gradient(180deg, rgba(243, 216, 215, 0.96), rgba(255, 251, 246, 0.88));
        transform: rotate(1.6deg);
      }

      .quality:nth-child(3) {
        background: linear-gradient(180deg, rgba(244, 203, 178, 0.9), rgba(255, 251, 246, 0.88));
        transform: rotate(-1.4deg);
      }

      .quality:nth-child(4) {
        background: linear-gradient(180deg, rgba(234, 223, 205, 0.95), rgba(255, 251, 246, 0.88));
        transform: rotate(2deg);
      }

      .quality::before {
        content: "";
        position: absolute;
        top: -10px;
        left: 24px;
        width: 96px;
        height: 22px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.44);
        transform: rotate(-8deg);
      }

      .quality .label {
        display: block;
        margin-bottom: 18px;
        color: var(--soft);
        font-family: "IBM Plex Mono", monospace;
        font-size: 14px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-weight: 700;
      }

      .quality strong {
        display: block;
        margin-bottom: 8px;
        font-family: "Noto Serif SC", serif;
        font-size: 42px;
        line-height: 1.12;
      }

      .quality span {
        display: block;
        color: var(--muted);
        font-size: 19px;
        line-height: 1.48;
      }

      .footer {
        position: absolute;
        left: 78px;
        right: 78px;
        bottom: 42px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: var(--soft);
        font-family: "IBM Plex Mono", monospace;
        font-size: 17px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="cover">
      <div class="sun-wash"></div>
      <div class="petals"></div>
      <div class="grain"></div>
      <div class="grid"></div>

      <header class="masthead">
        <div class="brand">oasis7 notes</div>
        <div class="season">spring recruit</div>
      </header>
      <div class="season-ticket">campus review season</div>

      <section class="hero">
        <div class="hero-copy">
          <div class="eyebrow">studio lead memo</div>
          <h1>
            今年春招，<br />
            <span class="accent">我会看什么人</span>
          </h1>
          <p>
            不先看你会多少工具。<br />
            先看你能不能把事接住。
          </p>
        </div>

        <div class="resume-stack">
          <div class="sheet back"></div>
          <div class="sheet front">
            <div class="pin"></div>
            <div class="title">what this is not</div>
            <h2>不是招聘启事</h2>
            <p>
              这是一个做项目的人，在春招季真的会拿来判断人的标准。
            </p>
          </div>
        </div>
      </section>

      <section class="qualities">
        <article class="quality">
          <span class="label">01</span>
          <strong>讲得清</strong>
          <span>不是“参与过”，是你到底做了什么。</span>
        </article>
        <article class="quality">
          <span class="label">02</span>
          <strong>做得完</strong>
          <span>项目可以小，但不能全是半成品。</span>
        </article>
        <article class="quality">
          <span class="label">03</span>
          <strong>会用 AI</strong>
          <span>不是代打，是提速，但最后自己判断。</span>
        </article>
        <article class="quality">
          <span class="label">04</span>
          <strong>玩家感觉</strong>
          <span>知道玩家会不会点，哪里会烦，哪里会留下。</span>
        </article>
      </section>

      <footer class="footer">
        <span>spring editorial cover</span>
        <span>2026.03.29</span>
      </footer>
    </main>
  </body>
</html>
