<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xiaohongshu Shared Participation Cover</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Noto+Serif+SC:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f3eadf;
        --paper-deep: #e5d7c6;
        --ink: #171311;
        --muted: rgba(23, 19, 17, 0.58);
        --line: rgba(23, 19, 17, 0.14);
        --brick: #a74331;
        --brick-soft: rgba(167, 67, 49, 0.12);
        --teal: #315c59;
        --gold: #cb8d3d;
        --shadow: rgba(23, 19, 17, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 16% 14%, rgba(167, 67, 49, 0.16), transparent 24%),
          radial-gradient(circle at 84% 16%, rgba(49, 92, 89, 0.12), transparent 22%),
          linear-gradient(180deg, #f8f0e4 0%, #e6d9ca 100%);
        color: var(--ink);
        font-family: "Noto Serif SC", serif;
      }

      .cover {
        position: relative;
        width: 1080px;
        height: 1440px;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.34), transparent 22%),
          linear-gradient(180deg, var(--paper) 0%, var(--paper-deep) 100%);
      }

      .noise,
      .grid,
      .beams,
      .ring,
      .spark {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .noise {
        opacity: 0.1;
        background-image:
          radial-gradient(circle at 22% 24%, rgba(0, 0, 0, 0.6) 0.8px, transparent 0.9px),
          radial-gradient(circle at 74% 66%, rgba(0, 0, 0, 0.3) 0.8px, transparent 0.9px),
          radial-gradient(circle at 40% 84%, rgba(0, 0, 0, 0.24) 0.8px, transparent 0.9px);
        background-size: 30px 30px, 42px 42px, 56px 56px;
      }

      .grid {
        background-image:
          linear-gradient(to right, var(--line) 1px, transparent 1px),
          linear-gradient(to bottom, var(--line) 1px, transparent 1px);
        background-size: 74px 74px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.26), transparent 88%);
      }

      .beams::before,
      .beams::after {
        content: "";
        position: absolute;
        inset: auto;
        height: 2px;
        background: linear-gradient(90deg, transparent, rgba(23, 19, 17, 0.16), transparent);
      }

      .beams::before {
        left: 120px;
        right: 120px;
        top: 212px;
      }

      .beams::after {
        left: 180px;
        right: 180px;
        bottom: 208px;
      }

      .ring::before,
      .ring::after {
        content: "";
        position: absolute;
        border-radius: 999px;
      }

      .ring::before {
        width: 470px;
        height: 470px;
        left: 305px;
        top: 512px;
        border: 1px solid rgba(23, 19, 17, 0.12);
        box-shadow:
          0 0 0 24px rgba(255, 255, 255, 0.18),
          inset 0 0 0 28px rgba(255, 255, 255, 0.18);
      }

      .ring::after {
        width: 316px;
        height: 316px;
        left: 382px;
        top: 589px;
        background:
          radial-gradient(circle at 50% 45%, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0.24) 62%, transparent 72%),
          radial-gradient(circle at 50% 50%, rgba(167, 67, 49, 0.08), transparent 74%);
        border: 1px solid rgba(23, 19, 17, 0.1);
      }

      .spark {
        background:
          radial-gradient(circle at 50% 52%, rgba(203, 141, 61, 0.16), transparent 12%),
          radial-gradient(circle at 50% 52%, rgba(49, 92, 89, 0.1), transparent 22%);
      }

      .meta {
        position: absolute;
        top: 92px;
        left: 138px;
        right: 138px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: "IBM Plex Mono", monospace;
        font-size: 20px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .meta strong {
        color: var(--brick);
        font-weight: 700;
      }

      .hero {
        position: absolute;
        left: 144px;
        top: 228px;
        width: 796px;
      }

      .eyebrow {
        margin: 0 0 30px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 20px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--brick);
      }

      h1 {
        margin: 0;
        font-size: 108px;
        line-height: 1.03;
        letter-spacing: -0.085em;
        font-weight: 900;
      }

      h1 .line {
        display: block;
      }

      h1 .shift {
        margin-left: 138px;
      }

      .divider {
        width: 196px;
        height: 6px;
        margin: 48px 0 30px;
        background: linear-gradient(90deg, var(--ink), var(--gold));
      }

      .subcopy {
        margin: 0 0 0 248px;
        max-width: 446px;
        font-size: 28px;
        line-height: 1.62;
        color: rgba(23, 19, 17, 0.8);
      }

      .rail {
        position: absolute;
        width: 270px;
        padding: 24px 24px 26px;
        border: 1px solid rgba(23, 19, 17, 0.14);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.16)),
          rgba(243, 234, 223, 0.76);
        box-shadow: 0 20px 48px var(--shadow);
      }

      .rail::after {
        content: "";
        position: absolute;
        width: 132px;
        height: 1px;
        background: rgba(23, 19, 17, 0.16);
      }

      .rail-dev {
        left: 118px;
        top: 706px;
        transform: rotate(-5deg);
      }

      .rail-dev::after {
        right: -116px;
        top: 146px;
        transform: rotate(18deg);
      }

      .rail-player {
        right: 110px;
        top: 690px;
        transform: rotate(5deg);
      }

      .rail-player::after {
        left: -118px;
        top: 170px;
        transform: rotate(-18deg);
      }

      .rail-share {
        left: 156px;
        bottom: 202px;
        width: 312px;
        transform: rotate(-2deg);
      }

      .rail-share::after {
        right: -150px;
        top: -48px;
        width: 176px;
        transform: rotate(28deg);
      }

      .rail-label {
        margin: 0 0 14px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 16px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .rail-title {
        margin: 0 0 14px;
        font-size: 42px;
        line-height: 1.18;
        font-weight: 800;
      }

      .rail-copy {
        margin: 0;
        font-size: 27px;
        line-height: 1.56;
        color: rgba(23, 19, 17, 0.78);
      }

      .center-note {
        position: absolute;
        left: 418px;
        top: 838px;
        width: 244px;
        text-align: center;
        transform: rotate(-3deg);
      }

      .center-note .small {
        margin: 0 0 12px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 16px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--teal);
      }

      .center-note .big {
        margin: 0;
        font-size: 52px;
        line-height: 1.2;
        font-weight: 900;
      }

      .footer {
        position: absolute;
        right: 132px;
        bottom: 124px;
        text-align: right;
      }

      .footer .small {
        margin: 0 0 12px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 17px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .footer .big {
        margin: 0;
        font-size: 40px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main class="cover">
      <div class="noise"></div>
      <div class="grid"></div>
      <div class="beams"></div>
      <div class="ring"></div>
      <div class="spark"></div>

      <header class="meta">
        <span><strong>OASIS7</strong> / XHS 13</span>
        <span>shared participation</span>
      </header>

      <section class="hero">
        <p class="eyebrow">Build The Game Together</p>
        <h1>
          <span class="line">人人都是</span>
          <span class="line shift">游戏builder</span>
          <span class="line">一起把它做起来</span>
        </h1>
        <div class="divider"></div>
        <p class="subcopy">
          开发者在做。玩家也在做。<br />
          认真把它讲出去的人，也在做。
        </p>
      </section>

      <aside class="rail rail-dev">
        <p class="rail-label">Role 01</p>
        <p class="rail-title">开发者</p>
        <p class="rail-copy">
          写代码<br />
          补细节<br />
          把世界真的搭起来
        </p>
      </aside>

      <aside class="rail rail-player">
        <p class="rail-label">Role 02</p>
        <p class="rail-title">玩家</p>
        <p class="rail-copy">
          试玩法<br />
          提反馈<br />
          把判断带回项目里
        </p>
      </aside>

      <aside class="rail rail-share">
        <p class="rail-label">Role 03</p>
        <p class="rail-title">传播者</p>
        <p class="rail-copy">
          讲清楚它想做什么<br />
          把它带给更多人
        </p>
      </aside>

      <div class="center-note">
        <p class="small">not passing by</p>
        <p class="big">
          都在参与<br />
          都在推动
        </p>
      </div>

      <footer class="footer">
        <p class="small">relationship first</p>
        <p class="big">
          先别急着谈制度<br />
          先把一起做游戏这层关系立住
        </p>
      </footer>
    </main>
  </body>
</html>
