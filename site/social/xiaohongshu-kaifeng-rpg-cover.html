<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xiaohongshu Kaifeng RPG Cover</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Noto+Serif+SC:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f4ecdf;
        --paper-deep: #e7dcc9;
        --ink: #161311;
        --muted: rgba(22, 19, 17, 0.58);
        --line: rgba(22, 19, 17, 0.14);
        --scarlet: #a6322a;
        --scarlet-soft: rgba(166, 50, 42, 0.14);
        --gold: #c88a2f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 16% 12%, rgba(166, 50, 42, 0.18), transparent 24%),
          radial-gradient(circle at 82% 18%, rgba(200, 138, 47, 0.12), transparent 22%),
          linear-gradient(180deg, #f7efe4 0%, #e6dccd 100%);
        color: var(--ink);
        font-family: "Noto Serif SC", serif;
      }

      .cover {
        position: relative;
        width: 1080px;
        height: 1440px;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.35), transparent 24%),
          linear-gradient(180deg, var(--paper) 0%, var(--paper-deep) 100%);
      }

      .noise,
      .grid,
      .arch,
      .curtain,
      .ticket {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .noise {
        opacity: 0.1;
        background-image:
          radial-gradient(circle at 18% 26%, rgba(0, 0, 0, 0.62) 0.8px, transparent 0.9px),
          radial-gradient(circle at 74% 66%, rgba(0, 0, 0, 0.34) 0.8px, transparent 0.9px),
          radial-gradient(circle at 42% 82%, rgba(0, 0, 0, 0.28) 0.8px, transparent 0.9px);
        background-size: 28px 28px, 42px 42px, 48px 48px;
      }

      .grid {
        background-image:
          linear-gradient(to right, var(--line) 1px, transparent 1px),
          linear-gradient(to bottom, var(--line) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.28), transparent 88%);
      }

      .curtain::before,
      .curtain::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        width: 124px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 18%),
          linear-gradient(90deg, #8f251f 0%, #b23931 40%, #8a211c 100%);
        box-shadow: inset -18px 0 0 rgba(255, 255, 255, 0.06);
      }

      .curtain::before {
        left: 0;
      }

      .curtain::after {
        right: 0;
        transform: scaleX(-1);
      }

      .arch::before {
        content: "";
        position: absolute;
        left: 168px;
        right: 168px;
        top: 154px;
        bottom: 180px;
        border: 2px solid rgba(22, 19, 17, 0.1);
        border-bottom-left-radius: 48px;
        border-bottom-right-radius: 48px;
        border-top-left-radius: 420px;
        border-top-right-radius: 420px;
      }

      .arch::after {
        content: "";
        position: absolute;
        left: 212px;
        right: 212px;
        top: 198px;
        bottom: 224px;
        border: 1px solid rgba(22, 19, 17, 0.08);
        border-bottom-left-radius: 36px;
        border-bottom-right-radius: 36px;
        border-top-left-radius: 372px;
        border-top-right-radius: 372px;
      }

      .ticket::before {
        content: "ENTER STORY";
        position: absolute;
        right: 142px;
        top: 222px;
        padding: 14px 18px;
        border: 1px solid rgba(22, 19, 17, 0.18);
        background: rgba(255, 255, 255, 0.34);
        font-family: "IBM Plex Mono", monospace;
        font-size: 18px;
        letter-spacing: 0.18em;
        color: rgba(22, 19, 17, 0.72);
        transform: rotate(7deg);
      }

      .meta {
        position: absolute;
        top: 86px;
        left: 154px;
        right: 154px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: "IBM Plex Mono", monospace;
        font-size: 20px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .meta .dot {
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }

      .meta .dot::before {
        content: "";
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: var(--scarlet);
        box-shadow: 0 0 0 10px var(--scarlet-soft);
      }

      .hero {
        position: absolute;
        left: 176px;
        right: 176px;
        top: 318px;
      }

      .eyebrow {
        margin: 0 0 32px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 20px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--scarlet);
      }

      h1 {
        margin: 0;
        font-size: 132px;
        line-height: 1.02;
        letter-spacing: -0.08em;
        font-weight: 900;
      }

      h1 .line {
        display: block;
      }

      h1 .offset {
        margin-left: 118px;
      }

      .divider {
        width: 168px;
        height: 6px;
        margin: 56px 0 34px;
        background: linear-gradient(90deg, var(--ink), var(--gold));
      }

      .subcopy {
        max-width: 620px;
        margin: 0;
        font-size: 34px;
        line-height: 1.6;
        color: rgba(22, 19, 17, 0.8);
      }

      .callout {
        position: absolute;
        left: 176px;
        bottom: 156px;
        width: 520px;
        padding: 28px 30px 30px;
        border: 1px solid rgba(22, 19, 17, 0.16);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.18)),
          rgba(244, 236, 223, 0.78);
        box-shadow: 0 24px 64px rgba(22, 19, 17, 0.08);
      }

      .callout-title {
        margin: 0 0 18px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 18px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--scarlet);
      }

      .callout-copy {
        margin: 0;
        font-size: 34px;
        line-height: 1.5;
      }

      .footer {
        position: absolute;
        right: 176px;
        bottom: 166px;
        text-align: right;
      }

      .footer .small {
        margin: 0 0 10px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 18px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .footer .big {
        margin: 0;
        font-size: 42px;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <main class="cover">
      <div class="noise"></div>
      <div class="grid"></div>
      <div class="curtain"></div>
      <div class="arch"></div>
      <div class="ticket"></div>

      <div class="meta">
        <span class="dot">OASIS7 / XHS 11</span>
        <span>KAIFENG / NPC / RPG</span>
      </div>

      <section class="hero">
        <p class="eyebrow">Not Sightseeing / Enter Plot</p>
        <h1>
          <span class="line">最吸引人的</span>
          <span class="line offset">不是看景</span>
          <span class="line">是进剧情</span>
        </h1>
        <div class="divider"></div>
        <p class="subcopy">
          很多人真正上头的，<br />
          不是场景有多完整。<br />
          是这个世界能不能很快把你拉进去。
        </p>
      </section>

      <section class="callout">
        <p class="callout-title">Field Note</p>
        <p class="callout-copy">
          开封这套真人 NPC 玩法<br />
          特别像低门槛实景 RPG
        </p>
      </section>

      <footer class="footer">
        <p class="small">Low barrier entry</p>
        <p class="big">
          世界先接住人<br />
          后面才有代入感
        </p>
      </footer>
    </main>
  </body>
</html>
