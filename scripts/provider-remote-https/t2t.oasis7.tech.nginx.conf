limit_req_zone $binary_remote_addr zone=oasis7_provider_per_ip:10m rate=10r/m;
limit_req_zone $http_authorization zone=oasis7_provider_per_token:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=oasis7_provider_conn_per_ip:10m;

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name t2t.oasis7.tech;

    ssl_certificate /etc/nginx/ssl/t2t.oasis7.tech.pem;
    ssl_certificate_key /etc/nginx/ssl/t2t.oasis7.tech.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 1m;
    limit_conn oasis7_provider_conn_per_ip 20;

    location /v1/ {
        limit_req zone=oasis7_provider_per_ip burst=10 nodelay;
        limit_req zone=oasis7_provider_per_token burst=20 nodelay;
        proxy_pass http://127.0.0.1:5841;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
